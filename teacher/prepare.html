<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>课前准备 - Merry英语</title>
    <link rel="stylesheet" href="teacher.css">
</head>
<body data-page="prepare">
    <div class="top-nav">
        <a href="index.html" class="back-btn">← 返回</a>
        <h1>📚 课前准备</h1>
    </div>
    
    <div class="teacher-view">
        <div class="teacher-card">
            <h3 class="card-title">📚 选择课程</h3>
            <div class="grid-2">
                <select class="select-input" id="unit-select">
                    <option value="1">Unit 1 动物</option>
                    <option value="2">Unit 2 数字</option>
                    <option value="3">Unit 3 颜色</option>
                    <option value="4">Unit 4 身体</option>
                </select>
                <select class="select-input" id="lesson-select">
                    <option value="1">Lesson 1</option>
                    <option value="2">Lesson 2</option>
                    <option value="3">Lesson 3</option>
                    <option value="4">Lesson 4</option>
                </select>
            </div>
        </div>

        <div class="teacher-card">
            <h3 class="card-title">🎯 选择模块</h3>
            <div class="grid-4" id="module-selector">
                <div class="module-select active" data-mod="listening">听力<br>✓</div>
                <div class="module-select" data-mod="reading">阅读<br>&nbsp;</div>
                <div class="module-select" data-mod="writing">写作<br>&nbsp;</div>
                <div class="module-select" data-mod="speaking">口语<br>&nbsp;</div>
            </div>
        </div>

        <div class="teacher-card">
            <h3 class="card-title">📊 选择阶段</h3>
            <div class="grid-2" id="phase-selector">
                <div class="phase-select active" data-phase="pretest">📝 前测<br><small>诊断学生水平</small></div>
                <div class="phase-select" data-phase="practice">🎮 实战<br><small>游戏化练习</small></div>
            </div>
        </div>

        <div class="teacher-card" id="objectives-container">
            <!-- Rendered by JS -->
        </div>

        <div class="teacher-card">
            <h3 class="card-title">👀 今日观察名单</h3>
            <div class="name-grid" id="observation-list">
                <!-- Rendered by JS -->
            </div>
        </div>

        <div class="teacher-card">
            <h3 class="card-title">📝 上节课未完成作业学生</h3>
            <div id="last-homework-incomplete">
                <p style="color:#888; font-size:14px;">暂无记录</p>
            </div>
        </div>

        <div class="teacher-card">
            <h3 class="card-title">✅ 本节课作业检查</h3>
            <p style="font-size: 13px; color: var(--teacher-text-light); margin-bottom: 10px;">左右滑动勾选未完成作业的学生：</p>
            
            <div class="hw-pages-container" id="homework-check-list">
                <!-- Data populated by JS (sliding pages) -->
            </div>
            <div class="hw-page-dots" id="hw-page-dots">
                <!-- JS will populate -->
            </div>

            <button class="teacher-btn btn-success" style="width: 100%; margin-top:15px;" id="btn-save-homework">
                💾 提交
            </button>
        </div>

        <div class="teacher-card">
            <h3 class="card-title">⏳ 答题时间</h3>
            <select class="select-input" id="time-limit-select">
                <option value="0">无限制 (推荐)</option>
                <option value="10">10秒 / 题</option>
                <option value="15">15秒 / 题</option>
                <option value="20">20秒 / 题</option>
                <option value="30">30秒 - 合作题专属</option>
            </select>
        </div>

        <button class="teacher-btn btn-primary" id="btn-start-class">
            🚀 开始上课 (发布任务)
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../firebase-sync.js"></script>
    <script src="data.js"></script>
    <script src="teacher.js"></script>
</body>
</html>
