<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merry英语 - 教师端</title>
    <link rel="stylesheet" href="teacher.css">
</head>
<body>
    <div class="top-nav">
        <h1>🎓 Merry英语 - 教师端</h1>
    </div>
    
    <div class="teacher-view">
        <a href="prepare.html" class="menu-block">
            <div class="menu-icon">📚</div>
            <div class="menu-content">
                <h3>课前准备</h3>
                <p>选择课程、查看观察名单</p>
            </div>
        </a>
        
        <a href="control.html" class="menu-block" style="border-left-color: var(--teacher-success);">
            <div class="menu-icon">🎯</div>
            <div class="menu-content">
                <h3 style="color: var(--teacher-success);">课中控制</h3>
                <p>发布任务、监控进度</p>
            </div>
        </a>
        
        <a href="feedback.html" class="menu-block" style="border-left-color: var(--teacher-warning);">
            <div class="menu-icon">📝</div>
            <div class="menu-content">
                <h3 style="color: var(--teacher-warning);">课后反馈</h3>
                <p>填写观察、查看AI报告</p>
            </div>
        </a>
        
        <a href="dashboard.html" class="menu-block" style="border-left-color: #8e44ad;">
            <div class="menu-icon">📊</div>
            <div class="menu-content">
                <h3 style="color: #8e44ad;">数据总览</h3>
