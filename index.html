<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Merry English App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <h1>请选择你们的名字 (选2人)</h1>
      <div class="student-list" id="student-list">
        <!-- JS will populate -->
      </div>
      
      <div class="module-selector" style="text-align: center; margin-bottom: 20px;">
        <h3>Select Module:</h3>
        <select id="module-select" style="padding: 10px; font-size: 18px; border-radius: 8px;">
          <option value="listening">Listening</option>
          <option value="reading">Reading</option>
          <option value="writing">Writing</option>
          <option value="speaking">Speaking</option>
        </select>
        <div style="margin-top: 10px;">
            <label><input type="radio" name="phase" value="pretest" checked> Pretest</label>
            <label style="margin-left: 20px;"><input type="radio" name="phase" value="practice"> Practice</label>
        </div>
      </div>

      <button id="start-btn" class="primary-btn" disabled>开始游戏</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="header">
        <div class="player-container active-player" id="player1-ui">
          <div class="avatar">👨‍🎓</div>
          <div class="name">Player 1</div>
          <div class="stars">⭐ 0</div>
        </div>
        <div class="player-container" id="player2-ui">
          <div class="avatar">👩‍🎓</div>
          <div class="name">Player 2</div>
          <div class="stars">⭐ 0</div>
        </div>
      </div>
      
      <div class="progress-bar-container">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="content-area" id="question-container">
        <!-- Question content rendered by JS -->
      </div>
    </div>
    
    <!-- Finish Screen -->
    <div id="finish-screen" class="screen">
      <h1>太棒了！</h1>
      <div id="finish-stars" style="font-size: 40px; text-align: center; margin: 20px 0;">⭐⭐⭐⭐⭐</div>
      <button class="primary-btn" onclick="location.reload()">再玩一次</button>
    </div>
  </div>
  
  <!-- Confetti Container -->
  <div id="confetti-container"></div>

  <script src="data/lesson1.js"></script>
  <script src="modules/listening.js"></script>
  <script src="modules/reading.js"></script>
  <script src="modules/writing.js"></script>
  <script src="modules/speaking.js"></script>
  <script src="app.js"></script>
</body>
</html>
