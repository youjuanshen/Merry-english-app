<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Merry英语">
  <meta name="theme-color" content="#58cc02">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>Merry English</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen: Step 1 - Select Students -->
    <div id="login-screen" class="screen active">
      <h1>请选择你们的名字（选2人）</h1>
      <div class="student-list" id="student-list">
        <!-- JS will populate -->
      </div>
      <button id="next-btn" class="primary-btn" disabled>下一步</button>
    </div>

    <!-- Module Select Screen: Step 2 - Choose Module -->
    <div id="module-screen" class="screen">
      <h1>选择今天的学习内容</h1>
      <div class="module-cards">
        <div class="module-card" data-module="listening">
          <div class="module-icon">👂</div>
          <div class="module-name">听力</div>
        </div>
        <div class="module-card" data-module="reading">
          <div class="module-icon">📖</div>
          <div class="module-name">阅读</div>
        </div>
        <div class="module-card" data-module="writing">
          <div class="module-icon">✏️</div>
          <div class="module-name">写作</div>
        </div>
        <div class="module-card" data-module="speaking">
          <div class="module-icon">🎤</div>
          <div class="module-name">口语</div>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="header">
        <div class="player-container active-player" id="player1-ui">
          <div class="avatar">👨‍🎓</div>
          <div class="name">Player 1</div>
          <div class="stars">⭐ 0</div>
        </div>
        <div class="question-progress" id="question-progress">1/12</div>
        <div class="player-container" id="player2-ui">
          <div class="avatar">👩‍🎓</div>
          <div class="name">Player 2</div>
          <div class="stars">⭐ 0</div>
        </div>
      </div>

      <div class="turn-indicator" id="turn-indicator">
        <span class="turn-progress">1/12</span>
        <span class="turn-name">请 <strong>张宇豪</strong> 同学回答</span>
      </div>

      <div class="content-area" id="question-container">
        <!-- Question content rendered by JS -->
      </div>
    </div>
    
    <!-- Finish Screen -->
    <div id="finish-screen" class="screen">
      <h1>太棒了！</h1>
      <div id="finish-stars" style="font-size: 40px; text-align: center; margin: 20px 0;">⭐⭐⭐⭐⭐</div>
      <button class="primary-btn" onclick="location.reload()">再玩一次</button>
    </div>
  </div>
  
  <!-- Confetti Container -->
  <div id="confetti-container"></div>

  <script src="data/lesson1.js"></script>
  <script src="modules/listening.js"></script>
  <script src="modules/reading.js"></script>
  <script src="modules/writing.js"></script>
  <script src="modules/speaking.js"></script>
  <script src="app.js"></script>
</body>
</html>
