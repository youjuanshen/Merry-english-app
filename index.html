<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Merry英语">
  <meta name="theme-color" content="#58cc02">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>Merry English</title>
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <div id="app">
    <!-- Welcome Screen - 简洁大气 -->
    <div id="welcome-screen" class="screen active">
      <div class="welcome-content">
        <p class="welcome-subtitle">欢迎来到</p>
        <h1 class="welcome-title">英语乐园</h1>
        <p class="welcome-english">Let's Learn English!</p>
        <p class="welcome-countdown" id="countdown">3</p>
      </div>
    </div>

    <!-- Login Screen: Step 1 - Select Students -->
    <div id="login-screen" class="screen">
      <!-- Added Course Info Display -->
      <div class="course-info-display" id="course-info-display" style="display:none;">
        <h3>今日课程</h3>
        <div class="course-card">
           <div class="c-title">📚 <span id="display-lesson-title">第一单元第一课</span></div>
           <div class="c-module">🎧 <span id="display-module-title">听力练习</span></div>
        </div>
      </div>

      <h1 class="login-title">选择你们的名字</h1>
      <p class="swipe-hint">左右滑动查看更多同学</p>

      <div class="student-pages-container" id="student-pages">
        <!-- JS will populate with pages -->
      </div>
      <div class="page-dots" id="page-dots">
        <!-- JS will populate -->
      </div>

      <div class="selected-students-display">
        <p>已选择：<span id="selected-names">______ 和 ______</span></p>
      </div>

      <button id="next-btn" class="primary-btn start-btn" disabled>开始学习</button>
    </div>

    <!-- Module Select Screen: Step 2 - Choose Module -->
    <div id="module-screen" class="screen" style="display:none;">
      <h1>选择今天的学习内容</h1>
      <div class="module-cards">
        <div class="module-card" data-module="listening">
          <div class="module-icon">👂</div>
          <div class="module-name">听力</div>
        </div>
        <div class="module-card" data-module="reading">
          <div class="module-icon">📖</div>
          <div class="module-name">阅读</div>
        </div>
        <div class="module-card" data-module="writing">
          <div class="module-icon">✏️</div>
          <div class="module-name">写作</div>
        </div>
        <div class="module-card" data-module="speaking">
          <div class="module-icon">🎤</div>
          <div class="module-name">口语</div>
        </div>
      </div>
    </div>

    <!-- Game Screen - 简洁设计 -->
    <div id="game-screen" class="screen">
      <div class="header">
        <div class="player-container active-player" id="player1-ui">
          <div class="avatar">A</div>
          <div class="name">Player 1</div>
          <div class="stars">0分</div>
        </div>
        <div class="question-progress" id="question-progress">1/12</div>
        <div class="player-container" id="player2-ui">
          <div class="avatar">B</div>
          <div class="name">Player 2</div>
          <div class="stars">0分</div>
        </div>
      </div>

      <div class="turn-indicator" id="turn-indicator">
        <span class="turn-progress">1/12</span>
        <span class="turn-name">请 <strong>张宇豪</strong> 回答</span>
      </div>

      <div class="content-area" id="question-container">
        <!-- Question content rendered by JS -->
      </div>
    </div>
    
    <!-- Finish Screen -->
    <div id="finish-screen" class="screen">
      <h1>太棒了！</h1>
      <div id="finish-stars" style="font-size: 40px; text-align: center; margin: 20px 0;">⭐⭐⭐⭐⭐</div>
      <button class="primary-btn" onclick="location.reload()">再玩一次</button>
    </div>
  </div>
  
  <!-- Confetti Container -->
  <div id="confetti-container"></div>

  <script src="data/lesson1.js?v=2"></script>
  <script src="data/unit1_lesson2.js?v=2"></script>
  <script src="data/unit1_lesson3.js?v=2"></script>
  <script src="data/unit1_lesson4.js?v=2"></script>
  <script src="data/unit2_lesson1.js?v=2"></script>
  <script src="data/unit2_lesson2.js?v=2"></script>
  <script src="data/unit2_lesson3.js?v=2"></script>
  <script src="data/unit2_lesson4.js?v=2"></script>
  <script src="data/unit3_lesson1.js?v=2"></script>
  <script src="data/unit3_lesson2.js?v=2"></script>
  <script src="data/unit3_lesson3.js?v=2"></script>
  <script src="data/unit3_lesson4.js?v=2"></script>
  <script src="data/unit4_lesson1.js?v=2"></script>
  <script src="data/unit4_lesson2.js?v=2"></script>
  <script src="data/unit4_lesson3.js?v=2"></script>
  <script src="data/unit4_lesson4.js?v=2"></script>
  <script src="modules/listening.js?v=2"></script>
  <script src="modules/reading.js?v=2"></script>
  <script src="modules/writing.js?v=2"></script>
  <script src="modules/speaking.js?v=2"></script>
  <script src="app.js?v=8"></script>
</body>
</html>
